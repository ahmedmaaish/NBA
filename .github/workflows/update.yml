name: Update NBA Signals & Deploy

on:
  schedule:
    - cron: '0 * * * *'    # every hour on the hour
  workflow_dispatch:         # manual trigger from Actions tab
  push:
    branches: [main]         # also deploy on every push

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner (update signals.json)
        run: python -m scanner.update

      - name: Commit updated signals back to repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add docs/data/signals.json
          git diff --cached --quiet || git commit -m "chore: update signals $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
